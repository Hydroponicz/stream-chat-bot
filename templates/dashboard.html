<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Chat Bot</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --text: #e0e0f0;
      --muted: #8888aa;
      --kick: #53fc53;
      --twitch: #9147ff;
      --admin: #f5a623;
      --correct: #00e5ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Top Bar ── */
    header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .04em; }
    .platforms { display: flex; gap: 12px; }
    .platform-badge { font-size: .75rem; padding: 4px 10px; border-radius: 99px; font-weight: 600; }
    .platform-badge.kick { background: #53fc5322; color: var(--kick); border: 1px solid #53fc5344; }
    .platform-badge.twitch { background: #9147ff22; color: var(--twitch); border: 1px solid #9147ff44; }

    /* ── Main Layout ── */
    main { display: grid; grid-template-columns: 1fr 320px; gap: 0; flex: 1; overflow: hidden; }

    /* ── Chat Panel ── */
    #chat-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    #chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: .8rem; color: var(--muted); display: flex; justify-content: space-between; }
    #chat-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .chat-msg { display: flex; gap: 10px; padding: 8px 10px; border-radius: 8px; background: var(--surface); font-size: .85rem; animation: slideIn .2s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .msg-meta { display: flex; flex-direction: column; gap: 2px; min-width: 80px; }
    .msg-user { font-weight: 600; font-size: .78rem; }
    .msg-user.kick { color: var(--kick); }
    .msg-user.twitch { color: var(--twitch); }
    .msg-time { font-size: .68rem; color: var(--muted); }
    .msg-text { flex: 1; line-height: 1.4; word-break: break-word; }
    .trivia-correct { color: var(--correct); font-size: .75rem; margin-top: 2px; }

    /* ── Right Sidebar ── */
    #sidebar { display: flex; flex-direction: column; overflow: hidden; }

    /* ── Leaderboard ── */
    #leaderboard-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .section-title { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
    #leaderboard-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
    .lb-entry { display: flex; justify-content: space-between; padding: 6px 8px; border-radius: 6px; background: var(--surface); font-size: .8rem; }
    .lb-rank { color: var(--muted); width: 20px; }
    .lb-user { flex: 1; font-weight: 500; }
    .lb-pts { color: var(--admin); font-weight: 600; }

    /* ── Trivia Card ── */
    #trivia-card { margin: 12px 0; padding: 12px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); }
    #trivia-card.active { border-color: var(--correct); background: #00e5ff0a; }
    #trivia-card h3 { font-size: .85rem; margin-bottom: 6px; }
    #trivia-question { font-size: .9rem; font-weight: 600; margin-bottom: 4px; }
    #trivia-hint { font-size: .75rem; color: var(--muted); }
    #trivia-participants { font-size: .7rem; color: var(--muted); margin-top: 4px; }

    /* ── Admin Controls ── */
    #admin-controls { padding: 14px 16px; flex: 1; overflow-y: auto; }
    .ctrl-group { margin-bottom: 16px; }
    .ctrl-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; display: block; }
    .ctrl-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    input[type="text"], input[type="number"] { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 10px; font-size: .82rem; outline: none; width: 100%; }
    input:focus { border-color: var(--admin); }
    button { padding: 7px 14px; border-radius: 6px; border: none; font-size: .8rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--admin); color: #000; }
    .btn-danger { background: #ff4444; color: #fff; }
    .btn-success { background: #44ff88; color: #000; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    #auth-overlay { position: fixed; inset: 0; background: #0f0f1aee; display: flex; align-items: center; justify-content: center; z-index: 100; }
    #auth-overlay.hidden { display: none; }
    #auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 340px; text-align: center; }
    #auth-box h2 { margin-bottom: 20px; font-size: 1rem; }
    #auth-box input { margin-bottom: 12px; }
    #auth-error { color: #ff6666; font-size: .8rem; margin-top: 8px; min-height: 18px; }

    /* ── Connection status dot ── */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #888; display: inline-block; }
    .status-dot.live { background: #44ff88; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  </style>
</head>
<body>

<header>
  <h1>Stream Chat Bot</h1>
  <div class="platforms">
    <span class="platform-badge kick">● KICK</span>
    <span class="platform-badge twitch">● TWITCH</span>
  </div>
</header>

<main>
  <!-- Chat -->
  <section id="chat-panel">
    <div id="chat-header">
      <span><span class="status-dot" id="sse-dot"></span> Live Chat</span>
      <span id="msg-count">0 messages</span>
    </div>
    <div id="chat-list"></div>
  </section>

  <!-- Sidebar -->
  <aside id="sidebar">
    <!-- Leaderboard -->
    <div id="leaderboard-section">
      <div class="section-title">Leaderboard</div>
      <div id="leaderboard-list">
        <div class="lb-entry" id="lb-empty"><span class="lb-user" style="color:var(--muted)">No points yet</span></div>
      </div>
    </div>

    <!-- Trivia -->
    <div id="trivia-card">
      <div class="section-title" style="margin-bottom:6px">Trivia</div>
      <div id="trivia-status" style="font-size:.8rem;color:var(--muted)">Inactive</div>
      <div id="trivia-info" style="margin-top:6px;display:none">
        <div id="trivia-question"></div>
        <div id="trivia-hint" style="font-size:.72rem;color:var(--muted);margin-top:2px"></div>
      </div>
      <div id="trivia-participants" style="font-size:.7rem;color:var(--muted);margin-top:4px"></div>
    </div>

    <!-- Admin Controls -->
    <div id="admin-controls">
      <div class="section-title">Admin Controls</div>

      <div class="ctrl-group">
        <label class="ctrl-label">Trivia</label>
        <div class="ctrl-row">
          <input type="text" id="trivia-q" placeholder="Question" style="flex:1" />
        </div>
        <div class="ctrl-row">
          <input type="text" id="trivia-a" placeholder="Answer" style="flex:1" />
          <input type="text" id="trivia-h" placeholder="Hint (optional)" style="flex:1" />
        </div>
        <div class="ctrl-row">
          <button class="btn-success" id="btn-trivia-start">Start Trivia</button>
          <button class="btn-danger" id="btn-trivia-stop">Stop</button>
        </div>
      </div>

      <div class="ctrl-group">
        <label class="ctrl-label">Points</label>
        <div class="ctrl-row">
          <input type="text" id="pts-user" placeholder="Username" />
          <input type="number" id="pts-amount" placeholder="Pts" style="width:80px" value="50" />
        </div>
        <div class="ctrl-row">
          <button class="btn-primary" id="btn-give-pts">Give Points</button>
        </div>
      </div>

      <div class="ctrl-group">
        <label class="ctrl-label">Game</label>
        <button class="btn-danger" id="btn-reset-lb">Reset Leaderboard</button>
      </div>

      <div style="margin-top:auto;padding-top:12px;border-top:1px solid var(--border);font-size:.7rem;color:var(--muted)">
        Trivia: first correct answer wins 100 pts.<br/>
        Points accumulate across sessions.
      </div>
    </div>
  </aside>
</main>

<!-- Auth Overlay -->
<div id="auth-overlay">
  <div id="auth-box">
    <h2>🔒 Admin Access</h2>
    <input type="password" id="auth-password" placeholder="Enter admin password" />
    <button class="btn-primary" id="btn-auth" style="width:100%">Unlock</button>
    <div id="auth-error"></div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let isAdmin = false;
let lastEvents = {};

// ── SSE ─────────────────────────────────────────────────────────────────────
const evtSource = new EventSource('/events');
const sseDot = document.getElementById('sse-dot');

evtSource.onopen = () => { sseDot.classList.add('live'); };
evtSource.onerror = () => { sseDot.classList.remove('live'); };

evtSource.addEventListener('chat_message', (e) => {
  const msg = JSON.parse(e.data);
  appendMessage(msg);
  lastEvents.chat_message = msg;
});

evtSource.addEventListener('trivia_start', (e) => {
  const d = JSON.parse(e.data);
  triviaCard.classList.add('active');
  document.getElementById('trivia-status').textContent = '🎯 Active';
  document.getElementById('trivia-info').style.display = 'block';
  document.getElementById('trivia-question').textContent = d.question;
  document.getElementById('trivia-hint').textContent = d.hint ? '💡 ' + d.hint : '';
  document.getElementById('trivia-participants').textContent = '';
});

evtSource.addEventListener('trivia_correct', (e) => {
  const d = JSON.parse(e.data);
  document.getElementById('trivia-participants').textContent =
    '✓ ' + d.username + ' got it!';
});

evtSource.addEventListener('trivia_stop', () => {
  triviaCard.classList.remove('active');
  document.getElementById('trivia-status').textContent = 'Inactive';
  document.getElementById('trivia-info').style.display = 'none';
  document.getElementById('trivia-participants').textContent = '';
});

evtSource.addEventListener('message', (e) => {
  const msg = JSON.parse(e.data);
  if (msg.type !== 'chat_message') console.debug('event:', msg.type, msg);
});

// ── UI Helpers ────────────────────────────────────────────────────────────────
const chatList = document.getElementById('chat-list');
const msgCount = document.getElementById('msg-count');
const triviaCard = document.getElementById('trivia-card');
const lbList = document.getElementById('leaderboard-list');

function appendMessage(msg) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  const t = new Date(msg.timestamp).toLocaleTimeString();
  div.innerHTML = `
    <div class="msg-meta">
      <span class="msg-user ${msg.platform}">${esc(msg.username)}</span>
      <span class="msg-time">${t}</span>
    </div>
    <div class="msg-text">${esc(msg.text)}</div>`;
  chatList.appendChild(div);
  chatList.scrollTop = chatList.scrollHeight;
  msgCount.textContent = chatList.children.length + ' messages';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderLeaderboard(lb) {
  lbList.innerHTML = '';
  if (!lb || lb.length === 0) {
    lbList.innerHTML = '<div class="lb-entry"><span class="lb-user" style="color:var(--muted)">No points yet</span></div>';
    return;
  }
  lb.forEach(([user, pts], i) => {
    const div = document.createElement('div');
    div.className = 'lb-entry';
    div.innerHTML = `<span class="lb-rank">#${i+1}</span><span class="lb-user">${esc(user)}</span><span class="lb-pts">${pts} pts</span>`;
    lbList.appendChild(div);
  });
}

// ── Auth ──────────────────────────────────────────────────────────────────────
let adminToken = null;

async function adminFetch(url, opts = {}) {
  const headers = { ...(opts.headers || {}) };
  if (adminToken) headers['Authorization'] = 'Basic ' + btoa('admin:' + adminToken);
  const r = await fetch(url, { ...opts, headers });
  if (r.status === 401) { isAdmin = false; showAuth(); }
  return r;
}

function showAuth() { document.getElementById('auth-overlay').classList.remove('hidden'); }
function hideAuth() { document.getElementById('auth-overlay').classList.add('hidden'); }

document.getElementById('btn-auth').addEventListener('click', async () => {
  const pw = document.getElementById('auth-password').value;
  if (!pw) return;
  // Test auth by calling a protected endpoint
  const r = await fetch('/api/status', {
    headers: { 'Authorization': 'Basic ' + btoa('admin:' + pw) }
  });
  if (r.ok) {
    adminToken = pw;
    isAdmin = true;
    hideAuth();
    document.getElementById('auth-password').value = '';
  } else {
    document.getElementById('auth-error').textContent = 'Incorrect password';
  }
});

// ── Admin Controls ─────────────────────────────────────────────────────────────
document.getElementById('btn-trivia-start').addEventListener('click', async () => {
  if (!isAdmin) return showAuth();
  const q = document.getElementById('trivia-q').value;
  const a = document.getElementById('trivia-a').value;
  const h = document.getElementById('trivia-h').value;
  const r = await adminFetch('/api/trivia/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: q, answer: a, hint: h })
  });
  if (r.ok) {
    document.getElementById('trivia-q').value = '';
    document.getElementById('trivia-a').value = '';
    document.getElementById('trivia-h').value = '';
  }
});

document.getElementById('btn-trivia-stop').addEventListener('click', async () => {
  if (!isAdmin) return showAuth();
  await adminFetch('/api/trivia/stop', { method: 'POST' });
});

document.getElementById('btn-give-pts').addEventListener('click', async () => {
  if (!isAdmin) return showAuth();
  const user = document.getElementById('pts-user').value;
  const pts = document.getElementById('pts-amount').value;
  if (!user) return;
  const r = await adminFetch('/api/points', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user, points: parseInt(pts) || 0 })
  });
  if (r.ok) document.getElementById('pts-user').value = '';
});

document.getElementById('btn-reset-lb').addEventListener('click', async () => {
  if (!isAdmin) return showAuth();
  if (!confirm('Reset leaderboard?')) return;
  await adminFetch('/api/leaderboard/reset', { method: 'POST' });
  renderLeaderboard([]);
});

// ── Boot: load recent messages + leaderboard ──────────────────────────────────
(async () => {
  const [msgRes, lbRes] = await Promise.all([
    fetch('/api/messages'),
    fetch('/api/leaderboard'),
  ]);
  if (msgRes.ok) {
    const msgs = await msgRes.json();
    msgs.forEach(m => appendMessage(m));
  }
  if (lbRes.ok) {
    renderLeaderboard(await lbRes.json());
  }
})();
</script>
</body>
</html>
